<script type="text/javascript">

/* Responsive scaling — resize the 1500×600 stage to fit the viewport.
   Done in JS because `transform: scale(calc(100vw / 1500))` yields a length,
   which is invalid for scale() and gets silently dropped. */
function fitStage() {
  var stage = document.querySelector('.stage');
  var wrap  = document.querySelector('.stage-wrap');
  if (!stage || !wrap) return;
  var vw = document.documentElement.clientWidth;
  var scale = Math.min(1, vw / 1500);
  stage.style.transform = 'scale(' + scale + ')';
  wrap.style.height = (600 * scale) + 'px';
}
window.addEventListener('resize', fitStage);
window.addEventListener('orientationchange', fitStage);
window.addEventListener('DOMContentLoaded', fitStage);

/* Tap-to-reveal on touch devices (and a bonus click toggle on desktop).
   Tap a hat → it turns color; tap again or tap elsewhere → it goes back. */
window.addEventListener('DOMContentLoaded', function () {
  var ids = ['fromage','panthers','disney','italia','bobchins','plaid',
             'superbowl','orange','clown','indiana','bulldog','mms','black',
             'yellowdot','flipside','swimming'];
  var active = null;
  function deactivate() {
    if (active) {
      var el = document.getElementById(active);
      if (el) el.classList.remove('active');
      active = null;
    }
  }
  ids.forEach(function (id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('click', function (e) {
      e.stopPropagation();
      if (active === id) { deactivate(); return; }
      deactivate();
      el.classList.add('active');
      active = id;
    });
  });
  document.body.addEventListener('click', deactivate);
});

</script>
